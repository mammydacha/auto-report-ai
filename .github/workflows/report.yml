name: Auto Report

on:
  schedule:
    - cron: "0 0 * * *"   # 毎日 09:00 JST
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # --- Ollama をインストールして起動 ---
      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          sleep 5

      # --- 無料モデル llama3 を pull ---
      - name: Pull model
        run: ollama pull llama3

      # --- Python セットアップ ---
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install requests

      # --- レポート生成スクリプト実行 ---
      - name: Run script
        run: python main.py

      # --- レポートをコミット ---
      - name: Commit report
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add reports
          git commit -m "Auto report" || echo "No changes"
          git push
