name: Generate Report

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  run-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake wget gettext

      - name: Download llama.cpp
        run: |
          git clone https://github.com/ggerganov/llama.cpp
          cd llama.cpp
          mkdir build
          cd build
          cmake ..
          cmake --build . --config Release

      - name: Download TinyLlama model (gguf)
        run: |
          mkdir -p models
          wget -O models/tinyllama.gguf \
            https://huggingface.co/TheBloke/TinyLlama-1.1B-Chat-v1.0-GGUF/resolve/main/tinyllama-1.1b-chat-v1.0.Q4_K_M.gguf

      - name: Fetch institutional investor data (現物)
        run: |
          mkdir -p data
          wget -O data/jpx_cash.csv \
            https://www.jpx.co.jp/markets/statistics-equities/investor-type/b5b4pj0000045v4j-att/data_j.csv

          tail -n 1 data/jpx_cash.csv | awk -F',' '{
            printf "【投資主体別売買動向（現物・最新週）】\n"
            printf "海外投資家：%s 億円\n", $2
            printf "個人投資家：%s 億円\n", $3
            printf "信託銀行：%s 億円\n", $4
            printf "投資信託：%s 億円\n", $5
          }' > data/institutional.txt

      - name: Fetch futures investor data (先物)
        run: |
          wget -O data/jpx_futures.csv \
            https://www.jpx.co.jp/markets/statistics-derivatives/investor-type/b5b4pj0000045v4j-att/data_f.csv

          tail -n 1 data/jpx_futures.csv | awk -F',' '{
            printf "【投資主体別売買動向（先物・最新週）】\n"
            printf "海外投資家：%s 枚\n", $2
            printf "個人投資家：%s 枚\n", $3
            printf "信託銀行：%s 枚\n", $4
            printf "投資信託：%s 枚\n", $5
          }' > data/futures.txt

      - name: Fetch ETF flow data
        run: |
          wget -O data/etf.csv \
            https://www.jpx.co.jp/markets/etfs-etns/etfs/b5b4pj0000045v4j-att/data_etf.csv

          tail -n 1 data/etf.csv | awk -F',' '{
            printf "【ETF資金流入（最新日）】\n"
            printf "TOPIX連動型：%s 億円\n", $2
            printf "日経225連動型：%s 億円\n", $3
          }' > data/etf.txt

      - name: Prepare prompt
        run: |
          export DATE=$(date +'%Y-%m-%d')
          export TREND="$(cat data/trend.txt)"
          export SOURCES="$(cat data/sources.txt)"
          export INSTITUTIONAL="$(cat data/institutional.txt)"
          export FUTURES="$(cat data/futures.txt)"
          export ETF="$(cat data/etf.txt)"

          envsubst < prompt/prompt_production.txt > prompt/filled_prompt.txt

      - name: Run model
        run: |
          cd llama.cpp/build
          ./bin/main \
            -m ../../models/tinyllama.gguf \
            -p "$(cat ../../prompt/filled_prompt.txt)" \
            -n 1200 \
            -temp 0.7 \
            > ../../report.md

      - name: Save report
        run: |
          mkdir -p reports
          cp report.md reports/$(date +'%Y-%m-%d')_report.md

      - name: Commit report
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add reports/*.md
          git commit -m "Daily report" || echo "No changes"
          git push
